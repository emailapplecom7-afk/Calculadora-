<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Lucro Real Pro</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --danger: #e74c3c;
            --bg: #f4f7f6;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            margin: 0; padding: 15px;
            display: flex; justify-content: center;
        }

        .container { 
            width: 100%; max-width: 450px; 
            background: white; padding: 25px; 
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
        }

        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; font-size: 1.5rem; border-bottom: 3px solid var(--secondary); padding-bottom: 10px; }

        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; font-size: 0.85rem; }
        
        input { 
            width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; 
            box-sizing: border-box; font-size: 1.1rem; transition: 0.3s;
        }

        input:focus { border-color: var(--secondary); outline: none; background: #f9fffb; }

        .row { display: flex; gap: 12px; }
        .row .input-group { flex: 1; }

        .buttons { display: flex; gap: 10px; margin-top: 10px; }
        button { 
            flex: 1; padding: 16px; color: white; border: none; border-radius: 12px; 
            cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.2s;
        }

        .btn-calc { background-color: var(--secondary); box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3); }
        .btn-clear { background-color: #bdc3c7; }
        button:active { transform: scale(0.95); }

        #resultado { 
            margin-top: 25px; padding: 20px; border-radius: 15px; 
            display: none; background-color: #fafafa; border: 1px solid #eee;
        }

        .res-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dashed #ddd; }
        .res-item span:last-child { font-weight: 600; color: #333; }
        
        .total { font-size: 1.3rem; color: var(--secondary); border-bottom: none; margin-top: 15px; padding-top: 10px; border-top: 2px solid #eee; }

        .disclaimer { font-size: 0.7rem; color: #aaa; text-align: center; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>Lucro Real Pro</h2>
    
    <div class="input-group">
        <label>Receita Bruta Total (R$)</label>
        <input type="text" id="receita" placeholder="R$ 0,00" oninput="mascaraMoeda(this)">
    </div>
    
    <div class="input-group">
        <label>Despesas Dedutíveis (R$)</label>
        <input type="text" id="despesas" placeholder="R$ 0,00" oninput="mascaraMoeda(this)">
    </div>

    <div class="row">
        <div class="input-group">
            <label>Créditos PIS/COF</label>
            <input type="text" id="creditos" placeholder="0,00" oninput="mascaraMoeda(this)">
        </div>
        <div class="input-group">
            <label>Outras Adições</label>
            <input type="text" id="adicoes" placeholder="0,00" oninput="mascaraMoeda(this)">
        </div>
    </div>

    <div class="buttons">
        <button class="btn-calc" onclick="calcular()">CALCULAR</button>
        <button class="btn-clear" onclick="limpar()">LIMPAR</button>
    </div>

    <div id="resultado">
        <div class="res-item"><span>Base de Cálculo:</span> <span id="r-base"></span></div>
        <div class="res-item"><span>PIS (1,65%):</span> <span id="r-pis"></span></div>
        <div class="res-item"><span>COFINS (7,6%):</span> <span id="r-cofins"></span></div>
        <div class="res-item"><span>IRPJ (15%):</span> <span id="r-irpj"></span></div>
        <div class="res-item"><span>Adicional IRPJ:</span> <span id="r-irpj-add"></span></div>
        <div class="res-item"><span>CSLL (9%):</span> <span id="r-csll"></span></div>
        <div class="res-item total"><strong>LUCRO LÍQUIDO:</strong> <span id="r-total"></span></div>
    </div>

    <p class="disclaimer">
        Cálculo baseado no regime não-cumulativo mensal.<br>
        Consulte sempre um contador para impostos oficiais.
    </p>
</div>

<script>
    // Função de máscara de moeda em tempo real
    function mascaraMoeda(i) {
        let v = i.value.replace(/\D/g,'');
        v = (v/100).toFixed(2) + '';
        v = v.replace(".", ",");
        v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
        v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
        i.value = "R$ " + v;
    }

    // Converte a string da máscara para número calculável
    function converterParaNumero(valor) {
        if(!valor) return 0;
        return parseFloat(valor.replace("R$ ", "").replace(/\./g, "").replace(",", ".")) || 0;
    }

    function formatar(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function calcular() {
        const receita = converterParaNumero(document.getElementById('receita').value);
        const despesas = converterParaNumero(document.getElementById('despesas').value);
        const creditos = converterParaNumero(document.getElementById('creditos').value);
        const adicoes = converterParaNumero(document.getElementById('adicoes').value);

        if (receita === 0 && adicoes === 0) {
            alert("Por favor, preencha os valores.");
            return;
        }

        // 1. PIS/COFINS (Não-Cumulativo)
        let pis = (receita * 0.0165) - (creditos * 0.0165);
        let cofins = (receita * 0.076) - (creditos * 0.076);
        pis = Math.max(0, pis);
        cofins = Math.max(0, cofins);

        // 2. Base do Lucro Real
        const lucroBase = (receita - despesas) + adicoes;

        let irpj = 0, irpjAdd = 0, csll = 0;

        if (lucroBase > 0) {
            irpj = lucroBase * 0.15;
            // Adicional de 10% sobre o lucro que excede R$ 20.000,00 no mês
            if (lucroBase > 20000) {
                irpjAdd = (lucroBase - 20000) * 0.10;
            }
            csll = lucroBase * 0.09;
        }

        // Lucro Líquido = Lucro Base - Impostos sobre o lucro
        const lucroFinal = lucroBase - (irpj + irpjAdd + csll);

        // Exibição
        document.getElementById('resultado').style.display = 'block';
        document.getElementById('r-base').innerText = formatar(lucroBase);
        document.getElementById('r-pis').innerText = formatar(pis);
        document.getElementById('r-cofins').innerText = formatar(cofins);
        document.getElementById('r-irpj').innerText = formatar(irpj);
        document.getElementById('r-irpj-add').innerText = formatar(irpjAdd);
        document.getElementById('r-csll').innerText = formatar(csll);
        
        const totalElem = document.getElementById('r-total');
        totalElem.innerText = formatar(lucroFinal);
        totalElem.style.color = lucroFinal < 0 ? "var(--danger)" : "var(--secondary)";
    }

    function limpar() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        document.getElementById('resultado').style.display = 'none';
    }
</script>

</body>
</html>
